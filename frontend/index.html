<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciamento de Tarefas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-dark bg-dark mb-4 px-3">
    <a class="navbar-brand" href="index.html">
      <i class="bi bi-kanban me-2"></i><span>TaskManager</span>
    </a>
    <div class="d-flex gap-2">
      <a href="index.html"    class="nav-link text-white" data-page="index.html">
        <i class="bi bi-kanban me-1"></i>Quadro
      </a>
      <a href="usuarios.html" class="nav-link text-white" data-page="usuarios.html">
        <i class="bi bi-people me-1"></i>Usuários
      </a>
      <a href="tarefas.html"  class="nav-link text-white" data-page="tarefas.html">
        <i class="bi bi-plus-circle me-1"></i>Nova Tarefa
      </a>
    </div>
  </nav>

  <div class="container-fluid px-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="page-title"><i class="bi bi-kanban me-2"></i>Quadro de Tarefas</h1>
      <a href="tarefas.html" class="btn btn-primary">
        <i class="bi bi-plus-lg me-1"></i>Nova Tarefa
      </a>
    </div>

    <div class="kanban-wrapper">

      <div class="kanban-col">
        <div class="kanban-col-header afazer d-flex justify-content-between align-items-center">
          <span><i class="bi bi-circle me-1"></i>A Fazer</span>
          <span class="col-counter" id="count-a_fazer">0</span>
        </div>
        <div class="kanban-col-body" id="col-a_fazer"></div>
      </div>

      <div class="kanban-col">
        <div class="kanban-col-header fazendo d-flex justify-content-between align-items-center">
          <span><i class="bi bi-arrow-repeat me-1"></i>Fazendo</span>
          <span class="col-counter" id="count-fazendo">0</span>
        </div>
        <div class="kanban-col-body" id="col-fazendo"></div>
      </div>

      <div class="kanban-col">
        <div class="kanban-col-header pronto d-flex justify-content-between align-items-center">
          <span><i class="bi bi-check-circle me-1"></i>Pronto</span>
          <span class="col-counter" id="count-pronto">0</span>
        </div>
        <div class="kanban-col-body" id="col-pronto"></div>
      </div>

    </div>
  </div>

  <!-- Modal Edição -->
  <div class="modal fade" id="modalEdicao" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-pencil me-2"></i>Editar Tarefa</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="formEdicao">
          <div class="modal-body">
            <input type="hidden" id="edit-id">

            <div class="mb-3">
              <label class="form-label">Usuário Responsável</label>
              <select id="edit-usuario" class="form-select" required></select>
            </div>

            <div class="mb-3">
              <label class="form-label">Descrição</label>
              <textarea id="edit-descricao" class="form-control" rows="3" required></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label">Setor</label>
              <input type="text" id="edit-setor" class="form-control" required>
            </div>

            <div class="row">
              <div class="col-6 mb-3">
                <label class="form-label">Prioridade</label>
                <select id="edit-prioridade" class="form-select" required>
                  <option value="baixa">Baixa</option>
                  <option value="media">Média</option>
                  <option value="alta">Alta</option>
                </select>
              </div>
              <div class="col-6 mb-3">
                <label class="form-label">Status</label>
                <select id="edit-status" class="form-select" required>
                  <option value="a_fazer">A Fazer</option>
                  <option value="fazendo">Fazendo</option>
                  <option value="pronto">Pronto</option>
                </select>
              </div>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg me-1"></i>Salvar
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Modal Confirmação Exclusão -->
  <div class="modal fade" id="modalConfirm" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title text-danger">
            <i class="bi bi-exclamation-triangle me-1"></i>Confirmar Exclusão
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body pt-2">
          <p class="mb-1">Deseja remover a tarefa:</p>
          <p class="fw-semibold" id="confirm-desc"></p>
        </div>
        <div class="modal-footer border-0 pt-0">
          <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-danger btn-sm" id="btnConfirmarExclusao">
            <i class="bi bi-trash me-1"></i>Remover
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/kanban.js"></script>
</body>
</html>
