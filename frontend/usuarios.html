<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Usuários</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-dark bg-dark mb-4 px-3">
    <a class="navbar-brand" href="index.html">
      <i class="bi bi-kanban me-2"></i><span>TaskManager</span>
    </a>
    <div class="d-flex gap-2">
      <a href="index.html"    class="nav-link text-white" data-page="index.html">
        <i class="bi bi-kanban me-1"></i>Quadro
      </a>
      <a href="usuarios.html" class="nav-link text-white" data-page="usuarios.html">
        <i class="bi bi-people me-1"></i>Usuários
      </a>
      <a href="tarefas.html"  class="nav-link text-white" data-page="tarefas.html">
        <i class="bi bi-plus-circle me-1"></i>Nova Tarefa
      </a>
    </div>
  </nav>

  <div class="container">
    <h1 class="page-title mb-4"><i class="bi bi-person-plus me-2"></i>Cadastro de Usuários</h1>

    <div class="row gap-4 align-items-start flex-wrap">

      <div class="form-card col-auto flex-grow-1" style="max-width:480px">
        <h5 class="mb-4 fw-semibold">Novo Usuário</h5>
        <form id="formUsuario" novalidate>

          <div class="mb-3">
            <label for="nome" class="form-label">Nome <span class="text-danger">*</span></label>
            <input
              type="text"
              id="nome"
              class="form-control"
              placeholder="Nome completo"
              required
              minlength="2"
            >
          </div>

          <div class="mb-4">
            <label for="email" class="form-label">E-mail <span class="text-danger">*</span></label>
            <input
              type="email"
              id="email"
              class="form-control"
              placeholder="usuario@email.com"
              required
            >
          </div>

          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-person-check me-1"></i>Cadastrar Usuário
          </button>
        </form>
      </div>

      <div class="flex-grow-1" style="min-width:280px">
        <h5 class="fw-semibold mb-3">Usuários Cadastrados</h5>
        <div class="bg-white rounded-3 shadow-sm overflow-hidden">
          <table class="table table-hover mb-0">
            <thead class="table-dark">
              <tr>
                <th style="width:50px">#</th>
                <th>Nome</th>
                <th>E-mail</th>
              </tr>
            </thead>
            <tbody id="tabela-usuarios">
              <tr>
                <td colspan="3" class="text-center text-muted py-3">Carregando...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/usuarios.js"></script>
</body>
</html>
