<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Tarefas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-dark bg-dark mb-4 px-3">
    <a class="navbar-brand" href="index.html">
      <i class="bi bi-kanban me-2"></i><span>TaskManager</span>
    </a>
    <div class="d-flex gap-2">
      <a href="index.html"    class="nav-link text-white" data-page="index.html">
        <i class="bi bi-kanban me-1"></i>Quadro
      </a>
      <a href="usuarios.html" class="nav-link text-white" data-page="usuarios.html">
        <i class="bi bi-people me-1"></i>Usuários
      </a>
      <a href="tarefas.html"  class="nav-link text-white" data-page="tarefas.html">
        <i class="bi bi-plus-circle me-1"></i>Nova Tarefa
      </a>
    </div>
  </nav>

  <div class="container">
    <h1 class="page-title mb-4"><i class="bi bi-clipboard-plus me-2"></i>Cadastro de Tarefas</h1>

    <div class="form-card">
      <h5 class="mb-4 fw-semibold">Nova Tarefa</h5>
      <form id="formTarefa" novalidate>

        <div class="mb-3">
          <label for="id_usuario" class="form-label">Usuário Responsável <span class="text-danger">*</span></label>
          <select id="id_usuario" class="form-select" required>
            <option value="">Carregando usuários...</option>
          </select>
          <div class="form-text">
            <a href="usuarios.html">Cadastrar novo usuário</a>
          </div>
        </div>

        <div class="mb-3">
          <label for="descricao" class="form-label">Descrição <span class="text-danger">*</span></label>
          <textarea
            id="descricao"
            class="form-control"
            rows="3"
            placeholder="Descreva a tarefa..."
            required
          ></textarea>
        </div>

        <div class="mb-3">
          <label for="setor" class="form-label">Setor <span class="text-danger">*</span></label>
          <input
            type="text"
            id="setor"
            class="form-control"
            placeholder="Ex: Produção, Qualidade, TI..."
            required
          >
        </div>

        <div class="mb-4">
          <label for="prioridade" class="form-label">Prioridade <span class="text-danger">*</span></label>
          <select id="prioridade" class="form-select" required>
            <option value="">Selecione a prioridade</option>
            <option value="baixa">🟢 Baixa</option>
            <option value="media">🟡 Média</option>
            <option value="alta">🔴 Alta</option>
          </select>
        </div>

        <div class="alert alert-info py-2 mb-4">
          <i class="bi bi-info-circle me-1"></i>
          O status inicial será <strong>A Fazer</strong> automaticamente.
        </div>

        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary flex-grow-1">
            <i class="bi bi-check-lg me-1"></i>Cadastrar Tarefa
          </button>
          <a href="index.html" class="btn btn-outline-secondary">
            <i class="bi bi-kanban me-1"></i>Ver Quadro
          </a>
        </div>

      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/tarefas.js"></script>
</body>
</html>
